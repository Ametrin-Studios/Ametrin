import java.nio.file.Files
import java.nio.file.StandardOpenOption

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version "$moddev_version"
    id 'idea'
}

version = mod_version
group = mod_group_id

base {
    archivesName = "$mod_id-$minecraft_version"
}

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

java.toolchain.languageVersion = JavaLanguageVersion.of(25)

neoForge {
    version = project.neo_version

    accessTransformers = project.files('src/main/resources/ametrin.base.cfg')
    validateAccessTransformers = true

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

repositories {
    mavenLocal()
}

dependencies {

}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,

            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

var generateNullMarkedPackages = tasks.register("generateNullMarkedPackages"){
    doLast {
        def srcRoot = file("src/main/java").toPath()
        def basePath = srcRoot.resolve(group.replace('.', '/'))

        Files.walk(basePath)
        .filter {Files.isDirectory(it) }
        .forEach {dir ->
            def pkgInfo = dir.resolve("package-info.java")
            if(Files.exists(pkgInfo)) return

            def rel = srcRoot.relativize(dir).toString().replace(File.separator, '.')
            def content = "@org.jspecify.annotations.NullMarked\npackage ${rel};\n"
            Files.writeString(pkgInfo, content, StandardOpenOption.CREATE_NEW)
        }
    }
}
// neoForge.ideSyncTask generateNullMarkedPackages

tasks.register('sourcesJar', Jar) {
    archiveClassifier = 'sources'
    from sourceSets.main.allSource
}

artifacts {
    archives sourcesJar
}

